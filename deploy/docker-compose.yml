services:
  api:
    container_name: wa-bot-notif-api
    build:
      context: ..
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      PORT: ${PORT:-5000}
      AUTH_DB_DSN: file:/data/auth.db?_foreign_keys=on
      LOGS_DB_DSN: file:/data/logs.db?_foreign_keys=on
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - wa_bot_notif_data:/data
    init: true
    stop_grace_period: 20s
    restart: "no"
    networks:
      default:
      integration:
        aliases:
          - wa-bot-notif-api

volumes:
  wa_bot_notif_data:

networks:
  integration:
    external: true
    name: ${INTEGRATION_NETWORK:-homelab_integration}
